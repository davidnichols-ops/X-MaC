name: Bug Report
description: Report a bug in X-MaC
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      value: |
        1. Run `xmac ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: X-MaC version
      description: Output of `xmac --version` or the app version.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      description: macOS version or Linux distro.
      placeholder: "macOS 14.5 (Sonoma) / Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Hardware (for macOS)
      description: Mac model (Intel / Apple Silicon).
      placeholder: "M2 Pro / Intel i7"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output. Run with `RUST_LOG=debug` for verbose output.
      render: shell
