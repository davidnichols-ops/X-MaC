# X-MaC Safety Rules — Application Caches
# Caches that applications regenerate on launch

- name: safari_cache
  description: "Safari browser cache — regenerated on browsing"
  rating: safe
  paths:
    - "~/Library/Caches/com.apple.Safari/**"
  confidence: 90
  category: apps

- name: chrome_cache
  description: "Chrome browser cache — re-downloads on browsing"
  rating: safe
  paths:
    - "~/Library/Caches/Google/Chrome/**"
    - "~/Library/Application Support/Google/Chrome/Default/Cache/**"
  confidence: 88
  category: apps

- name: firefox_cache
  description: "Firefox browser cache — regenerated on browsing"
  rating: safe
  paths:
    - "~/Library/Caches/Firefox/**"
  confidence: 88
  category: apps

- name: slack_cache
  description: "Slack cached workspace data — re-downloads on launch but holds offline messages"
  rating: review
  paths:
    - "~/Library/Application Support/Slack/Cache/**"
    - "~/Library/Caches/com.tinyspeck.slackmacgap/**"
  confidence: 71
  category: apps

- name: spotify_cache
  description: "Spotify cached audio — re-streams on playback"
  rating: safe
  paths:
    - "~/Library/Caches/com.spotify.client/**"
    - "~/Library/Application Support/Spotify/PersistentFiles/**"
  confidence: 85
  category: apps

- name: vscode_cache
  description: "VS Code cache — regenerated on launch"
  rating: safe
  paths:
    - "~/Library/Caches/com.microsoft.VSCode/**"
    - "~/Library/Application Support/Code/Cache/**"
    - "~/Library/Application Support/Code/CachedData/**"
  confidence: 87
  category: apps

- name: vscode_extensions
  description: "VS Code extensions — reinstalled from marketplace, but may hold local state"
  rating: review
  paths:
    - "~/.vscode/extensions/**"
  confidence: 65
  category: apps

- name: xcode_cache
  description: "Xcode application cache — regenerated on launch"
  rating: safe
  paths:
    - "~/Library/Caches/com.apple.dt.Xcode/**"
  confidence: 90
  category: apps

- name: system_logs
  description: "System and application log files — safe to remove, regenerated as needed"
  rating: safe
  paths:
    - "~/Library/Logs/**"
    - "/private/var/log/**"
  confidence: 80
  category: apps

- name: trash
  description: "Trash contents — user already decided to delete these"
  rating: safe
  paths:
    - "~/.Trash/**"
  confidence: 95
  category: apps

- name: downloads_dmgs
  description: "Downloaded disk images and installers — usually safe to remove after install"
  rating: review
  paths:
    - "~/Downloads/*.dmg"
    - "~/Downloads/*.pkg"
    - "~/Downloads/*.iso"
  confidence: 72
  category: apps

- name: language_packs
  description: "Unused language packs — safe if you use one language"
  rating: review
  paths:
    - "/Applications/**/*.lproj/**"
  confidence: 60
  category: apps

- name: generic_user_cache
  description: "User application cache — most apps regenerate these on launch"
  rating: safe
  paths:
    - "~/Library/Caches/**"
  confidence: 75
  category: apps

- name: generic_system_cache
  description: "System cache files — regenerated by the OS as needed"
  rating: safe
  paths:
    - "/Library/Caches/**"
  confidence: 70
  category: apps

- name: temp_files
  description: "Temporary files — safe to remove, regenerated as needed"
  rating: safe
  paths:
    - "/private/tmp/**"
    - "/private/var/tmp/**"
    - "~/Library/Application Support/**/*.tmp"
  confidence: 85
  category: apps
