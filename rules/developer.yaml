# X-MaC Safety Rules — Developer Tools
# Each rule classifies files by risk: safe (preselected), review (shown), protected (blocked)

- name: xcode_derived_data
  description: "Xcode build intermediates — regenerated on next compile"
  rating: safe
  paths:
    - "~/Library/Developer/Xcode/DerivedData/**"
    - "~/Library/Developer/Xcode/Archives/**"
  confidence: 98
  category: developer

- name: xcode_simulator_data
  description: "Xcode simulator runtime data — re-downloads from Xcode"
  rating: safe
  paths:
    - "~/Library/Developer/CoreSimulator/Devices/**"
    - "~/Library/Developer/CoreSimulator/Caches/**"
  confidence: 90
  category: developer

- name: xcode_ios_device_support
  description: "Xcode iOS device support files — re-downloaded when device connected"
  rating: safe
  paths:
    - "~/Library/Developer/Xcode/iOS DeviceSupport/**"
  confidence: 85
  category: developer

- name: cargo_target
  description: "Rust build artifacts in target/ — regenerated by cargo build"
  rating: safe
  paths:
    - "**/target/debug/**"
    - "**/target/release/**"
  confidence: 95
  category: developer

- name: node_modules
  description: "Node.js dependencies — reinstalled by npm install or yarn"
  rating: safe
  paths:
    - "**/node_modules/**"
  confidence: 92
  category: developer

- name: go_build_cache
  description: "Go build cache — regenerated by go build"
  rating: safe
  paths:
    - "~/Library/Caches/go-build/**"
  confidence: 95
  category: developer

- name: pnpm_store
  description: "pnpm content-addressable store — pruned by pnpm store prune"
  rating: review
  paths:
    - "~/Library/pnpm/store/**"
  confidence: 75
  category: developer

- name: docker_build_cache
  description: "Docker build cache — use 'docker builder prune' instead of deleting"
  rating: review
  paths:
    - "~/Library/Containers/com.docker.docker/Data/vms/**"
  confidence: 70
  category: developer

- name: homebrew_cache
  description: "Homebrew download cache — cleared by 'brew cleanup'"
  rating: safe
  paths:
    - "~/Library/Caches/Homebrew/downloads/**"
    - "~/Library/Caches/Homebrew/api/**"
  confidence: 90
  category: developer

- name: pip_cache
  description: "Python pip cache — re-downloads on demand"
  rating: safe
  paths:
    - "~/Library/Caches/pip/**"
    - "~/.cache/pip/**"
  confidence: 88
  category: developer

- name: gradle_cache
  description: "Gradle build cache — regenerated on next build"
  rating: safe
  paths:
    - "~/.gradle/caches/**"
    - "~/.gradle/wrapper/**"
  confidence: 85
  category: developer

- name: maven_cache
  description: "Maven repository cache — re-downloads on demand"
  rating: safe
  paths:
    - "~/.m2/repository/**"
  confidence: 82
  category: developer
